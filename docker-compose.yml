services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: madrasa_api
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/madrasa
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: replace-with-strong-secret
      JWT_REFRESH_SECRET: replace-with-strong-secret
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_DAYS: 30
      ALLOW_BOOTSTRAP: "true"
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: sync+restart
          path: ./crates/shared/src
          target: /app/crates/shared/src
        - action: sync+restart
          path: ./crates/db/src
          target: /app/crates/db/src
        - action: sync+restart
          path: ./migrations
          target: /app/migrations
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./apps/api/Cargo.toml
        - action: rebuild
          path: ./crates/shared/Cargo.toml
        - action: rebuild
          path: ./crates/db/Cargo.toml

  postgres:
    image: postgres:16
    container_name: madrasa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: madrasa
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madrasa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: madrasa_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: madrasa_frontend
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: madrasa_nginx
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  redis_data:
